<!DOCTYPE html>
<html lang="es">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:black;
  font-family:-apple-system,sans-serif;
}

.phone{
  width:clamp(320px,28vw,480px);
  aspect-ratio:9/16;
  background:url("Untitled.jpg") center/cover no-repeat;
  position:relative;
  color:white;
}

/* MOBILE */
@media(max-width:768px){
  .phone{
    width:100vw;
    height:100dvh;
    aspect-ratio:unset;
  }
}

/* APPS */
.apps{
  position:absolute;
  top:80px;
  width:100%;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:25px;
  padding:20px;
  text-align:center;
}

.app img{
  width:65px;height:65px;border-radius:18px;
}

/* DOCK */
.dock{
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  width:90%;
  height:90px;
  background:rgba(255,255,255,0.2);
  backdrop-filter:blur(10px);
  border-radius:25px;
  display:flex;
  justify-content:space-around;
  align-items:center;
}

.dock img{
  width:60px;height:60px;border-radius:15px;
}
</style>
</head>

<body>

<div class="phone">

<div class="apps">

  <div class="app">
    <img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png">
    Youtube
  </div>

  <div class="app">
    <img src="https://cdn-icons-png.flaticon.com/512/174/174872.png">
    Spotify
  </div>

  <div class="app">
    <img src="https://cdn-icons-png.flaticon.com/512/2111/2111624.png">
    Soundcloud
  </div>

  <div class="app">
    <img src="https://cdn-icons-png.flaticon.com/512/732/732200.png">
    App Store
  </div>

</div>

<div class="dock">
  <img src="https://cdn-icons-png.flaticon.com/512/724/724664.png">
  <img src="https://cdn-icons-png.flaticon.com/512/1829/1829586.png">
  <img src="https://cdn-icons-png.flaticon.com/512/2920/2920349.png">
</div>

</div>

</body>
</html>
