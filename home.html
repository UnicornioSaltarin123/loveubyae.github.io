<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">

<title>loveubyae</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  height:100dvh;
  background:url("Untitled homexcreen.jpg") center/cover no-repeat;
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
  overflow:hidden;
  display:flex;
  justify-content:center;
  color:white;
}

.phone{
  width:390px;
  height:100%;
  position:relative;
}

/* APP */
.app{
  position:absolute;
  width:70px;
  text-align:center;
  user-select:none;
}

/* ICON */
.icon{
  width:60px;
  height:60px;
  border-radius:14px;
  background-size:cover;
  background-position:center;
  margin:auto;

  box-shadow:
    0 4px 8px rgba(0,0,0,0.6),
    inset 0 1px 1px rgba(255,255,255,0.3);

  transition:all .15s ease;
  position:relative;
}

/* BADGE */
.badge{
  position:absolute;
  top:-6px;
  right:-6px;
  background:#ff3b30;
  color:white;
  font-size:10px;
  padding:2px 5px;
  border-radius:10px;
  border:1px solid rgba(0,0,0,0.3);
}

/* LABEL */
.label{
  font-size:11px;
  margin-top:4px;
  text-shadow:0 1px 2px black;
}

/* TAP */
.app:active .icon{
  transform:scale(0.8);
  filter:brightness(0.6);
}

/* WIGGLE */
.wiggle{
  animation:wiggle .2s infinite alternate;
}

@keyframes wiggle{
  from{transform:rotate(-2deg);}
  to{transform:rotate(2deg);}
}

/* OPEN */
.open{
  position:fixed;
  inset:0;
  background:black;
  z-index:999;
  animation:zoom .35s forwards;
}

@keyframes zoom{
  0%{transform:scale(.3);opacity:0;}
  100%{transform:scale(1);opacity:1;}
}
</style>
</head>

<body>

<div class="phone">

<!-- FILA 1 -->
<div class="app" style="top:90px; left:25px;" onclick="openApp(this,'https://www.youtube.com/@loveubyae')">
  <div class="icon" style="background-image:url('https://cdn-icons-png.flaticon.com/512/1384/1384060.png')">
    <div class="badge">3</div>
  </div>
  <div class="label">YouTube</div>
</div>

<div class="app" style="top:90px; left:120px;" onclick="openApp(this,'https://www.instagram.com/loveubyae/')">
  <div class="icon" style="background-image:url('https://cdn-icons-png.flaticon.com/512/2111/2111463.png')"></div>
  <div class="label">Instagram</div>
</div>

<div class="app" style="top:90px; left:215px;" onclick="openApp(this,'https://music.apple.com/us/artist/loveubyae/1742559202')">
  <div class="icon" style="background-image:url('https://cdn-icons-png.flaticon.com/512/731/731985.png')"></div>
  <div class="label">Music</div>
</div>

<div class="app" style="top:90px; left:310px;" onclick="openApp(this,'https://soundcloud.com/loveubyae')">
  <div class="icon" style="background-image:url('https://cdn-icons-png.flaticon.com/512/5968/5968940.png')"></div>
  <div class="label">SoundCloud</div>
</div>

<!-- FILA 2 -->
<div class="app" style="top:190px; left:25px;">
  <div class="icon wiggle" style="background-image:url('https://cdn-icons-png.flaticon.com/512/992/992651.png')"></div>
  <div class="label">Calculator</div>
</div>

<div class="app" style="top:190px; left:120px;">
  <div class="icon wiggle" style="background-image:url('https://cdn-icons-png.flaticon.com/512/992/992700.png')"></div>
  <div class="label">Clock</div>
</div>

<div class="app" style="top:190px; left:215px;">
  <div class="icon wiggle" style="background-image:url('https://cdn-icons-png.flaticon.com/512/1163/1163661.png')"></div>
  <div class="label">Weather</div>
</div>

<div class="app" style="top:190px; left:310px;">
  <div class="icon wiggle" style="background-image:url('https://cdn-icons-png.flaticon.com/512/854/854878.png')"></div>
  <div class="label">Maps</div>
</div>

</div>

<script>
function openApp(el,url){

  // vibración móvil
  if(navigator.vibrate) navigator.vibrate(10);

  const rect = el.getBoundingClientRect();

  const overlay = document.createElement("div");
  overlay.className="open";
  overlay.style.transformOrigin = `${rect.left}px ${rect.top}px`;

  document.body.appendChild(overlay);

  setTimeout(()=>{
    window.location.href = url;
  },300);
}
</script>

</body>
</html>
