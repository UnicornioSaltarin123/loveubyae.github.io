<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cuidarte</title>

<!-- VERSION -->
<meta name="app-version" content="1.0.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

html,body{
  height:100%;
  overflow:hidden;
}

/* bloquear selección */
body{
  user-select:none;
  -webkit-user-select:none;

  height:100dvh;
  background:url("Untitled FONDO COMPLETO DE LA WEB.jpg") center/cover no-repeat;
  font-family:-apple-system, sans-serif;

  transition:transform .2s ease, opacity .2s ease;
}

/* PHONE */
.phone{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(1.25);

  width:min(420px, 90vw);
  aspect-ratio:9/16;

  overflow:hidden;
  background:url("Untitled homexcreen.jpg") center/cover no-repeat;
  color:white;
}

/* GRID */
.apps{
  position:absolute;
  top:95px;
  width:100%;

  display:grid;
  grid-template-columns:repeat(4,1fr);
  justify-items:center;
  row-gap:40px;
}

/* APP */
.app{
  display:flex;
  flex-direction:column;
  align-items:center;
  text-decoration:none;
  color:white;

  font-size:13px;
  font-weight:500;

  text-shadow:0 1px 2px rgba(0,0,0,0.9);
}

/* ICON */
.app img{
  width:100px;
  height:100px;
  border-radius:22%;
  object-fit:cover;

  box-shadow:0 6px 12px rgba(0,0,0,0.35);

  transition:transform .12s ease, filter .12s ease;
}

.app:active img{
  transform:scale(0.8);
  filter:brightness(0.75);
}

/* MOBILE */
@media (max-width:768px){
  .phone{
    width:100vw;
    height:100dvh;
    aspect-ratio:auto;
    top:0;
    left:0;
    transform:none;
  }

  .app img{
    width:85px;
    height:85px;
  }
}
</style>
</head>

<body>

<div class="phone">

  <div class="apps">

    <!-- FILA 1 -->
    <a class="app" href="https://www.youtube.com/@loveubyae">
      <img src="yt.png">
      <span>YouTube</span>
    </a>

    <a class="app" href="https://www.instagram.com/loveubyae/">
      <img src="insta.png">
      <span>Instagram</span>
    </a>

    <a class="app" href="https://open.spotify.com/artist/3mKaKeiv9UUbJSAHr8VqFe">
      <img src="spotify-2012-06-25.png">
      <span>Spotify</span>
    </a>

    <a class="app" href="https://music.apple.com/us/artist/loveubyae/1742559202">
      <img src="music app.png">
      <span>Music</span>
    </a>

    <!-- FILA 2 -->
    <a class="app" href="https://soundcloud.com/loveubyae">
      <img src="sc.png">
      <span>SoundCloud</span>
    </a>

    <a class="app" href="https://linktr.ee/loveubyae">
      <img src="linktree.png">
      <span>Linktree</span>
    </a>

    <a class="app" href="notes.html">
      <img src="Notes.png">
      <span>Notes</span>
    </a>

    <div class="app">
      <img src="weather.png">
      <span>Weather</span>
    </div>

    <!-- FILA 3 -->
    <div class="app">
      <img src="maps.png">
      <span>Maps</span>
    </div>

    <a class="app" href="photos.html">
      <img src="fotos.png">
      <span>Photos</span>
    </a>

    <a class="app" href="safari.html">
      <img src="safari-iphone-icon-26-removebg-preview.png">
      <span>Safari</span>
    </a>

    <!-- CLOCK -->
    <div class="app">
      <img src="clock.png">
      <span>Clock</span>
    </div>

  </div>

</div>

<!-- SONIDO -->
<audio id="clickSound" src="click.mp3"></audio>

<script>
const VERSION="1.0.0";
const sound = document.getElementById("clickSound");

/* CLICK (igual pero con version) */
document.querySelectorAll("a.app").forEach(app=>{
  app.addEventListener("click",(e)=>{
    const link = app.getAttribute("href");

    if(link){
      e.preventDefault();

      sound.currentTime = 0;
      sound.play();

      document.body.style.transform = "scale(1.1)";
      document.body.style.opacity = "0";

      setTimeout(()=>{
        window.location.href = link + (link.includes("?")?"&":"?")+"v="+VERSION;
      },180);
    }
  });
});

/* BLOQUEOS */

/* click derecho */
document.addEventListener("contextmenu",e=>e.preventDefault());

/* F12 + inspect */
document.addEventListener("keydown",e=>{
  if(
    e.key==="F12" ||
    (e.ctrlKey && e.shiftKey && ["I","J","C"].includes(e.key)) ||
    (e.ctrlKey && e.key==="U")
  ){
    e.preventDefault();
    return false;
  }
});
</script>

</body>
</html>
