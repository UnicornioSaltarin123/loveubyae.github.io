<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>loveubyae</title>

<style>
body{
  margin:0;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

/* IPHONE */
.phone{
  position:relative;
  height:90vh;
  aspect-ratio:9/16;
  max-width:420px;
  overflow:hidden;
  border-radius:30px;
}

/* FONDO */
.wallpaper{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
}

/* APPS */
.apps{
  position:absolute;
  top:40px;
  width:100%;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:25px;
  justify-items:center;
}

/* ICONOS */
.app{
  display:flex;
  flex-direction:column;
  align-items:center;
  text-decoration:none;
  color:white;
  font-size:12px;
  user-select:none;
}

.app img{
  width:60px;
  height:60px;
  border-radius:22%;
  transition:.2s;
  box-shadow:
    inset 0 2px 3px rgba(255,255,255,0.6),
    inset 0 -2px 3px rgba(0,0,0,0.2),
    0 4px 10px rgba(0,0,0,0.4);
}

/* CLICK */
.app:active img{
  transform:scale(0.85);
}

/* 🔥 JIGGLE LENTO */
.apps.edit .app img{
  animation:jiggle 1.4s infinite;
}

@keyframes jiggle{
  0%{ transform:rotate(-1deg);}
  50%{ transform:rotate(1deg);}
  100%{ transform:rotate(-1deg);}
}
</style>
</head>

<body>

<div class="phone">

  <!-- FONDO -->
  <img class="wallpaper" src="Untitled homexcreen.jpg">

  <!-- APPS -->
  <div class="apps">

    <a class="app" href="https://www.youtube.com/@loveubyae">
      <img src="youtube.png">
      <span>YouTube</span>
    </a>

    <a class="app" href="https://www.instagram.com/loveubyae/">
      <img src="instagram.png">
      <span>Instagram</span>
    </a>

    <a class="app" href="https://music.apple.com/us/artist/loveubyae/1742559202">
      <img src="music.png">
      <span>Music</span>
    </a>

    <a class="app" href="https://soundcloud.com/loveubyae">
      <img src="soundcloud.png">
      <span>SoundCloud</span>
    </a>

    <!-- SEGUNDA FILA -->

    <div class="app">
      <img src="calculator.png">
      <span>Calculator</span>
    </div>

    <div class="app">
      <img src="clock.png">
      <span>Clock</span>
    </div>

    <div class="app">
      <img src="weather.png">
      <span>Weather</span>
    </div>

    <div class="app">
      <img src="maps.png">
      <span>Maps</span>
    </div>

  </div>

</div>

<!-- 🔥 SCRIPT JIGGLE -->
<script>
let pressTimer;

document.querySelectorAll('.app').forEach(app => {

  app.addEventListener('mousedown', () => {
    pressTimer = setTimeout(() => {
      document.querySelector('.apps').classList.toggle('edit');
    }, 500);
  });

  app.addEventListener('mouseup', () => clearTimeout(pressTimer));
  app.addEventListener('mouseleave', () => clearTimeout(pressTimer));

});
</script>

</body>
</html>
