<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>loveubyae</title>

<!-- 🔒 SECURITY -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; img-src 'self' https: data:; script-src 'self' 'unsafe-inline' https:; style-src 'self' 'unsafe-inline' https:;">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: monospace;
}

body {
  background: #d97b7b;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.phone {
  width: 320px;
  height: 600px;
  background: #000;
  border-radius: 30px;
  padding: 15px;
  box-shadow: 0 0 30px rgba(0,0,0,0.6);
}

@media (min-width: 768px) {
  .phone {
    transform: scale(1.2);
  }
}

.screen {
  width: 100%;
  height: 100%;
  background: #111;
  border-radius: 20px;
  color: white;
  overflow: hidden;
  position: relative;
}

.lock {
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

.time {
  font-size: 40px;
}

.slide {
  position: absolute;
  bottom: 30px;
  color: #888;
  font-size: 12px;
}

.home {
  display: none;
  padding: 20px;
}

.status {
  font-size: 12px;
  display: flex;
  justify-content: space-between;
  color: #aaa;
}

.apps {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  margin-top: 40px;
}

.app {
  text-align: center;
  cursor: pointer;
}

.icon {
  width: 60px;
  height: 60px;
  background: #222;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: auto;
}

.app-screen {
  display: none;
  position: absolute;
  inset: 0;
  background: black;
  padding: 20px;
}

.back {
  color: pink;
  cursor: pointer;
  margin-bottom: 20px;
}

.gallery {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 5px;
}

.gallery img {
  width: 100%;
  cursor: pointer;
}

.viewer {
  position: fixed;
  inset: 0;
  background: black;
  display: none;
  justify-content: center;
  align-items: center;
}

.viewer img {
  max-width: 90%;
}

.close {
  position: absolute;
  top: 20px;
  right: 20px;
  color: white;
  cursor: pointer;
}

a {
  color: pink;
}
</style>
</head>

<body>

<div class="phone">
  <div class="screen">

    <div class="lock" onclick="unlock()">
      <div class="time" id="time"></div>
      <div class="slide">tap to unlock</div>
    </div>

    <div class="home" id="home">
      <div class="status">
        <span id="time2"></span>
        <span>♡ 100%</span>
      </div>

      <div class="apps">
        <div class="app" onclick="openApp('music')">
          <div class="icon">🎧</div>
          <small>music</small>
        </div>

        <div class="app" onclick="openApp('photos')">
          <div class="icon">📸</div>
          <small>photos</small>
        </div>

        <div class="app" onclick="openApp('about')">
          <div class="icon">💞</div>
          <small>about</small>
        </div>

        <div class="app" onclick="openApp('links')">
          <div class="icon">🔗</div>
          <small>links</small>
        </div>
      </div>
    </div>

    <div id="music" class="app-screen">
      <div class="back" onclick="closeApps()">← back</div>
      <h1>music</h1>
      <a href="#">Spotify</a>
    </div>

    <div id="photos" class="app-screen">
      <div class="back" onclick="closeApps()">← back</div>
      <h1>photos</h1>

      <div class="gallery">
        <img src="https://picsum.photos/200?1" onclick="view(this.src)">
        <img src="https://picsum.photos/200?2" onclick="view(this.src)">
        <img src="https://picsum.photos/200?3" onclick="view(this.src)">
      </div>
    </div>

    <div id="about" class="app-screen">
      <div class="back" onclick="closeApps()">← back</div>
      <h1>loveubyae</h1>
      <p>“escucho tu nombre y vuelvo a caer…”</p>
    </div>

    <div id="links" class="app-screen">
      <div class="back" onclick="closeApps()">← back</div>
      <h1>links</h1>
      <a href="#">Instagram</a><br>
      <a href="#">TikTok</a>
    </div>

  </div>
</div>

<div class="viewer" id="viewer" onclick="closeViewer()">
  <span class="close">✕</span>
  <img id="big">
</div>

<script>
function unlock() {
  document.querySelector(".lock").style.display = "none";
  document.getElementById("home").style.display = "block";
}

function openApp(id) {
  document.querySelectorAll(".app-screen").forEach(el => el.style.display = "none");
  document.getElementById(id).style.display = "block";
}

function closeApps() {
  document.querySelectorAll(".app-screen").forEach(el => el.style.display = "none");
}

function view(src) {
  document.getElementById("viewer").style.display = "flex";
  document.getElementById("big").src = src;
}

function closeViewer() {
  document.getElementById("viewer").style.display = "none";
}

function updateTime() {
  let now = new Date();
  let time = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  document.getElementById("time").innerText = time;
  document.getElementById("time2").innerText = time;
}
setInterval(updateTime, 1000);
updateTime();
</script>

</body>
</html>
