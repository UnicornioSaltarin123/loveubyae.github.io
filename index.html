<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>loveubyae</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Helvetica Neue", Arial;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: black;
}

/* PHONE */
.phone {
  width: 320px;
  height: 600px;
  border-radius: 30px;
  overflow: hidden;
  position: relative;
}

/* LOCKSCREEN */
.lock {
  position: relative;
  width: 100%;
  height: 100%;
  background: url('Untitled.jpg') center/cover no-repeat;
}

/* TOP BAR */
.topbar {
  position: absolute;
  top: 0;
  width: 100%;
  height: 30px;
  background: black;
  color: white;
  font-size: 12px;
  display: flex;
  justify-content: space-between;
  padding: 5px 10px;
}

.center-lock {
  position: absolute;
  top: 5px;
  width: 100%;
  text-align: center;
}

/* TIME */
.time {
  position: absolute;
  top: 80px;
  width: 100%;
  text-align: center;
  color: white;
  font-size: 60px;
}

.date {
  position: absolute;
  top: 150px;
  width: 100%;
  text-align: center;
  color: white;
  font-size: 18px;
}

/* NOTIFICATION */
.notification {
  position: absolute;
  bottom: 150px;
  width: 90%;
  left: 5%;
  background: rgba(0,0,0,0.6);
  border-radius: 10px;
  display: flex;
  padding: 10px;
  color: white;
}

.notification img {
  width: 50px;
  height: 50px;
  border-radius: 5px;
  margin-right: 10px;
}

.notification-text {
  font-size: 12px;
}

/* SLIDE */
.slide {
  position: absolute;
  bottom: 30px;
  width: 90%;
  left: 5%;
  height: 50px;
  background: rgba(255,255,255,0.2);
  border-radius: 25px;
  display: flex;
  align-items: center;
  padding: 5px;
}

.slider {
  width: 40px;
  height: 40px;
  background: white;
  border-radius: 10px;
  cursor: pointer;
}

.slide-text {
  position: absolute;
  width: 100%;
  text-align: center;
  color: #ccc;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="phone">
  <div class="lock" id="lock">

    <!-- TOP -->
    <div class="topbar">
      <span>diario</span>
      <span>17%</span>
    </div>

    <div class="center-lock">🔒</div>

    <!-- TIME -->
    <div class="time" id="time"></div>
    <div class="date" id="date"></div>

    <!-- NOTIFICATION -->
    <div class="notification">
      <img src="737e8593dfd9a0a5d2325a17eff8b85e.jpg">
      <div class="notification-text">
        <b>loveubyae</b><br>
        Por primera vez<br>
        nueva canción y video disponibles en todos lados!!!
      </div>
    </div>

    <!-- SLIDE -->
    <div class="slide">
      <div class="slider" id="slider"></div>
      <div class="slide-text">slide to unlock</div>
    </div>

  </div>
</div>

<script>
// TIME REAL
function updateTime() {
  let now = new Date();

  let time = now.toLocaleTimeString([], {
    hour: '2-digit',
    minute: '2-digit'
  });

  let date = now.toLocaleDateString('en-US', {
    weekday: 'long',
    month: 'long',
    day: 'numeric'
  });

  document.getElementById("time").innerText = time;
  document.getElementById("date").innerText = date;
}
setInterval(updateTime, 1000);
updateTime();

// SLIDE
let slider = document.getElementById("slider");
let isDragging = false;

slider.addEventListener("mousedown", () => isDragging = true);
document.addEventListener("mouseup", () => isDragging = false);

document.addEventListener("mousemove", (e) => {
  if (!isDragging) return;

  let rect = slider.parentElement.getBoundingClientRect();
  let x = e.clientX - rect.left;

  if (x > 0 && x < rect.width - 50) {
    slider.style.transform = `translateX(${x}px)`;
  }

  if (x > rect.width - 60) {
    document.getElementById("lock").style.display = "none";
  }
});
</script>

</body>
</html>
