<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  height:100dvh;
  background:url("Untitled FONDO COMPLETO DE LA WEB.jpg") center/cover no-repeat;
  overflow:hidden;
  font-family:-apple-system;
}

/* 📱 PHONE */
.phone{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(1.25);

  width:min(420px, 90vw);
  aspect-ratio:9/16;

  overflow:hidden;
  background:url("Untitled homexcreen.jpg") center/cover no-repeat;

  transition:transform .25s ease, opacity .25s ease;
}

/* CONTENEDOR */
#container{
  position:absolute;
  inset:0;
}

/* IMÁGENES */
.item{
  position:absolute;
  cursor:pointer;
}

.item img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* FLASH */
.flash{
  position:fixed;
  inset:0;
  background:white;
  opacity:0;
  pointer-events:none;
}

/* GLITCH */
.glitch{
  animation:glitch .1s infinite;
}

@keyframes glitch{
  0%{transform:translate(0);}
  25%{transform:translate(8px,-6px);}
  50%{transform:translate(-6px,6px);}
  75%{transform:translate(4px,-4px);}
  100%{transform:translate(0);}
}

/* MENSAJES */
.glitch-text{
  position:absolute;
  color:red;
  font-size:18px;
  opacity:0.7;
  pointer-events:none;
  animation:flicker 0.2s infinite;
}

@keyframes flicker{
  0%{opacity:0.2;}
  50%{opacity:0.8;}
  100%{opacity:0.2;}
}

/* MOBILE */
@media (max-width:768px){
  .phone{
    width:100vw;
    height:100dvh;
    aspect-ratio:auto;
    top:0;
    left:0;
    transform:none;
  }
}
</style>
</head>

const items = [];

/* FIX tamaño */
let W,H;
function updateSize(){
  W = container.clientWidth;
  H = container.clientHeight;
}
updateSize();
window.addEventListener("resize", updateSize);

/* CREAR */
images.forEach(src=>{
  const div = document.createElement("div");
  div.className="item";

  const size = Math.random()*120 + 120;

  let x = Math.random()*(W-size);
  let y = Math.random()*(H-size);

  let vx = (Math.random()-0.5)*2;
  let vy = (Math.random()-0.5)*2;

  div.style.width=size+"px";
  div.style.height=size+"px";

  const img=document.createElement("img");
  img.src=src;

  div.appendChild(img);

  div.onclick=()=>{
    flash.style.opacity="1";
    flash.style.background = Math.random()>0.5 ? "white" : "red";
    setTimeout(()=>flash.style.opacity="0",80);

    document.body.classList.add("glitch");
    setTimeout(()=>document.body.classList.remove("glitch"),120);

    const random=links[Math.floor(Math.random()*links.length)];
    window.open(random,"_blank");
  };

  container.appendChild(div);
  items.push({div,x,y,vx,vy,size});
});

/* MOVIMIENTO */
function update(){
  items.forEach(a=>{
    a.x+=a.vx;
    a.y+=a.vy;

    if(a.x<=0||a.x+a.size>=W) a.vx*=-1;
    if(a.y<=0||a.y+a.size>=H) a.vy*=-1;

    if(Math.random()>0.995){
      a.vx*=-1;
      a.vy*=-1;
    }

    a.div.style.transform=`translate(${a.x}px,${a.y}px)`;
  });
  requestAnimationFrame(update);
}
update();

/* GLITCH RANDOM */
setInterval(()=>{
  document.body.classList.add("glitch");

  if(Math.random()>0.6){
    document.body.style.filter="invert(1)";
    setTimeout(()=>document.body.style.filter="",120);
  }

  setTimeout(()=>document.body.classList.remove("glitch"),150);
},2000);

/* SWIPE */
let startX=0,currentX=0,isDragging=false;

phone.addEventListener("touchstart",e=>{
  startX=e.touches[0].clientX;
  if(startX<30) isDragging=true;
});

phone.addEventListener("touchmove",e=>{
  if(!isDragging) return;
  e.preventDefault();

  currentX=e.touches[0].clientX;
  let diff=currentX-startX;

  if(diff>0){
    phone.style.transform=`translateX(${diff}px)`;
  }
},{passive:false});

phone.addEventListener("touchend",()=>{
  if(!isDragging) return;
  isDragging=false;

  let diff=currentX-startX;

  if(diff>120){
    goHome();
  }else{
    phone.style.transform="translateX(0)";
  }
});

/* TECLADO */
document.addEventListener("keydown",e=>{
  if(["ArrowLeft","ArrowRight","a","d"].includes(e.key.toLowerCase())){
    goHome();
  }
});

function goHome(){
  phone.style.transform="translateX(100%)";
  phone.style.opacity="0";

  setTimeout(()=>{
    window.location.href="home.html";
  },250);
}
