<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cuidarte</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  height:100dvh;
  background:url("Untitled FONDO COMPLETO DE LA WEB.jpg") center/cover no-repeat;
  font-family:-apple-system;
  overflow:hidden;
}

/* 📱 PHONE */
.phone{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(1.25);

  width:min(420px, 90vw);
  aspect-ratio:9/16;

  overflow:hidden;
  background:black;
}

/* IMAGEN AJUSTADA */
.phone img{
  width:100%;
  height:100%;
  object-fit:contain; /* 🔥 clave para que no se corte raro */
  background:black;
}

/* BACK */
.back{
  position:absolute;
  top:30px;
  left:15px;

  color:#0a84ff;
  font-size:18px;
  text-decoration:none;
  font-weight:500;

  background:rgba(0,0,0,0.4);
  padding:6px 12px;
  border-radius:12px;
  z-index:10;
}

/* MOBILE */
@media (max-width:768px){
  .phone{
    width:100vw;
    height:100dvh;
    aspect-ratio:auto;
    top:0;
    left:0;
    transform:none;
  }
}
</style>
</head>

<body>

<div class="phone">

  <!-- 🔥 BACK A HOME -->
  <a class="back" href="index.html">← Back</a>

  <!-- IMAGEN -->
  <img src="notas foto.jpg">

</div>

</body>
</html>
