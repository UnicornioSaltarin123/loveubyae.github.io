<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Photos</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  height:100dvh;
  background:url("Untitled FONDO COMPLETO DE LA WEB.jpg") center/cover no-repeat;
  font-family:-apple-system;
  overflow:hidden;
}

/* 📱 PHONE */
.phone{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(1.25);

  width:min(420px, 90vw);
  aspect-ratio:9/16;
  overflow:hidden;
  background:#000;
}

/* TOP BAR */
.topbar{
  height:50px;
  background:linear-gradient(#4c4c4c,#2b2b2b);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
  font-weight:600;
}

/* GRID */
.gallery{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:2px;
  padding:4px;
  height:calc(100% - 100px);
  overflow:auto;
  background:black;
}

.gallery img{
  width:100%;
  aspect-ratio:1/1;
  object-fit:cover;
  cursor:pointer;
}

/* BOTTOM BAR */
.bottombar{
  height:50px;
  background:linear-gradient(#2b2b2b,#000);
  display:flex;
  justify-content:space-around;
  align-items:center;
  color:#ccc;
  font-size:12px;
}

/* VIEWER */
.viewer{
  position:absolute;
  inset:0;
  background:black;
  display:none;
  flex-direction:column;
  z-index:999;
}

/* VIEW IMAGE */
.viewer img{
  max-width:100%;
  max-height:100%;
  margin:auto;
  transition:transform .3s ease;
}

/* FADE ANIMATION */
.fadeIn{
  animation:fade .25s ease;
}

@keyframes fade{
  from{opacity:0;}
  to{opacity:1;}
}
</style>
</head>

<body>

<div class="phone">

  <div class="topbar">Photos</div>

  <div class="gallery" id="gallery"></div>

  <div class="bottombar">
    <span>Photos</span>
    <span>Albums</span>
    <span>Places</span>
  </div>

  <div class="viewer" id="viewer">
    <img id="fullImg">
  </div>

</div>

/* GENERAR GRID */
images.forEach((src,index)=>{
  const img = document.createElement("img");
  img.src = src;

  img.onclick = ()=>{
    currentIndex = index;
    openViewer();
  };

  gallery.appendChild(img);
});

/* ABRIR */
function openViewer(){
  viewer.style.display = "flex";
  fullImg.src = images[currentIndex];
  viewer.classList.add("fadeIn");
}

/* CERRAR */
viewer.onclick = ()=>{
  viewer.style.display = "none";
};

/* SWIPE */
let startX = 0;

viewer.addEventListener("touchstart", e=>{
  startX = e.touches[0].clientX;
});

viewer.addEventListener("touchend", e=>{
  let endX = e.changedTouches[0].clientX;

  if(endX - startX > 50){
    currentIndex--;
  }else if(startX - endX > 50){
    currentIndex++;
  }

  if(currentIndex < 0) currentIndex = images.length-1;
  if(currentIndex >= images.length) currentIndex = 0;

  fullImg.src = images[currentIndex];
});
</script>

</body>
</html>
